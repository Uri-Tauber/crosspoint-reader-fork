# Unicode interval presets — the SINGLE SOURCE OF TRUTH.
#
# Read (via interval_registry.py) by:
#   * fontconvert_sdcard.py     — uses `ranges` to rasterize glyph coverage.
#   * generate-font-manifest.py — uses `group`/`groups` to emit the per-family
#                                 `scripts` tags + top-level `scriptGroups` that
#                                 drive on-device grouping in FontDownloadActivity.
#
# Adding a new writing system (e.g. Arabic) is done HERE and nowhere else:
#   1. Add a `groups:` entry (tag + English label; list order = on-device order).
#   2. Add/point a preset at that group tag via `group:`.
# The device is fully data-driven from the manifest, so a new script reaches
# users with only a fonts-repo republish — no firmware change.
#
# groups:  ordered list of script groups shown on device. `label` is displayed
#          verbatim (device has no translation for these; see FontDownloadActivity).
#          At most 32 groups: the firmware tracks membership in a 32-bit
#          scriptMask (interval_registry.py enforces this at build time).
# presets: name -> { ranges: [[start, end], ...] (inclusive, hex ok),
#                    group: <tag> (optional; omit for coverage-only presets such
#                                  as punctuation/symbols that are not a script) }

groups:
  - {tag: latin,     label: Latin}
  - {tag: cyrillic,  label: Cyrillic}
  - {tag: greek,     label: Greek}
  - {tag: hebrew,    label: Hebrew}
  - {tag: georgian,  label: Georgian}
  - {tag: armenian,  label: Armenian}
  - {tag: ethiopic,  label: Ethiopic}
  - {tag: cjk,       label: CJK}
  - {tag: hangul,    label: Korean}
  - {tag: cherokee,  label: Cherokee}
  - {tag: tifinagh,  label: Tifinagh}

presets:
  ascii:
    ranges: [[0x0020, 0x007E]]
    group: latin
  latin1:
    ranges: [[0x0080, 0x00FF]]
    group: latin
  latin-ext:
    ranges: [[0x0020, 0x007E], [0x0080, 0x00FF], [0x0100, 0x024F],
             [0x02B0, 0x02FF], [0x1E00, 0x1EFF], [0x2000, 0x206F],
             [0xFB00, 0xFB06]]
    group: latin
  # Vietnamese uses Latin script — folds into the Latin group.
  vietnamese:
    ranges: [[0x01A0, 0x01B0], [0x1EA0, 0x1EF9]]
    group: latin
  greek:
    ranges: [[0x0370, 0x03FF], [0x1F00, 0x1FFF]]
    group: greek
  cyrillic:
    ranges: [[0x0400, 0x04FF], [0x0500, 0x052F]]
    group: cyrillic
  hebrew:
    ranges: [[0x0590, 0x05FF], [0xFB1D, 0xFB4F]]
    group: hebrew
  georgian:
    ranges: [[0x10A0, 0x10FF], [0x2D00, 0x2D2F]]
    group: georgian
  armenian:
    ranges: [[0x0530, 0x058F]]
    group: armenian
  ethiopic:
    ranges: [[0x1200, 0x137F], [0x1380, 0x139F], [0x2D80, 0x2DDF]]
    group: ethiopic
  cjk:
    ranges: [[0x3000, 0x303F], [0x3040, 0x309F], [0x30A0, 0x30FF],
             [0x4E00, 0x9FFF], [0xF900, 0xFAFF], [0xFF00, 0xFFEF]]
    group: cjk
  hangul:
    ranges: [[0xAC00, 0xD7AF], [0x1100, 0x11FF], [0x3130, 0x318F]]
    group: hangul
  cherokee:
    ranges: [[0x13A0, 0x13FF], [0xAB70, 0xABBF]]
    group: cherokee
  tifinagh:
    ranges: [[0x2D30, 0x2D7F]]
    group: tifinagh

  # ── Coverage-only presets (no `group`: not a writing system) ──────────────

  punctuation:
    ranges: [[0x2000, 0x206F]]
  # Symbol blocks commonly seen in scifi/popsci/literary fiction.
  symbols:
    ranges: [[0x2070, 0x209F], [0x20A0, 0x20CF], [0x2150, 0x218F],
             [0x2190, 0x21FF], [0x2200, 0x22FF], [0x2500, 0x257F],
             [0x25A0, 0x25FF], [0x2600, 0x26FF], [0x2700, 0x27BF]]
  # Composite preset for English-language literary fiction including scifi/popsci.
  # Greek for physics terms, math operators, geometric shapes, uncommon
  # dialogue punctuation, CJK quote marks, miscellaneous symbols (♪♫♬), dingbats.
  reading:
    ranges: [[0x0020, 0x024F], [0x02B0, 0x02FF], [0x0300, 0x036F], [0x0370, 0x03FF],
             [0x0400, 0x04FF], [0x1E00, 0x1EFF], [0x2000, 0x206F],
             [0x2070, 0x209F], [0x20A0, 0x20CF], [0x2150, 0x218F],
             [0x2190, 0x21FF], [0x2200, 0x22FF], [0x2500, 0x257F],
             [0x25A0, 0x25FF], [0x2600, 0x26FF], [0x2700, 0x27BF],
             [0x2900, 0x29FF], [0x2E00, 0x2E7F], [0x3000, 0x303F],
             [0xFB00, 0xFB06]]
  # Matches the built-in font intervals from fontconvert.py exactly.
  builtin:
    ranges: [[0x0000, 0x007F], [0x0080, 0x00FF], [0x0100, 0x017F],
             [0x01A0, 0x01A1], [0x01AF, 0x01B0], [0x01C4, 0x021F],
             [0x0300, 0x036F], [0x0400, 0x04FF],
             [0x1EA0, 0x1EF9], [0x2000, 0x206F], [0x20A0, 0x20CF],
             [0x2070, 0x209F], [0x2190, 0x21FF], [0x2200, 0x22FF],
             [0xFB00, 0xFB06]]
